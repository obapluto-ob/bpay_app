<!DOCTYPE html>
<html>
<head><title>BPay - Google Auth</title></head>
<body>
  <p>Signing you in...</p>
  <script>
    try {
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function(part) {
        var item = part.split('=');
        params[item[0]] = decodeURIComponent(item[1]);
      });

      if (params.id_token) {
        window.opener.postMessage({ type: 'GOOGLE_AUTH_TOKEN', token: params.id_token }, window.location.origin);
      } else if (params.error) {
        window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: params.error }, window.location.origin);
      } else {
        window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: 'No token received' }, window.location.origin);
      }
    } catch(e) {
      window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: e.toString() }, '*');
    }
    window.close();
  </script>
</body>
</html>
