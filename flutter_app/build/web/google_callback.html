<!DOCTYPE html>
<html>
<head><title>BPay - Google Auth</title></head>
<body style="background:#1a365d;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;">
  <div style="text-align:center;color:white;font-family:sans-serif;">
    <div style="font-size:24px;margin-bottom:12px;">₿<span style="color:#f59e0b">pay</span></div>
    <p id="status">Processing...</p>
    <p id="debug" style="font-size:11px;color:#94a3b8;max-width:300px;word-break:break-all;"></p>
  </div>
  <script>
    var debug = document.getElementById('debug');
    var status = document.getElementById('status');

    try {
      var fullUrl = window.location.href;
      var hash = window.location.hash.substring(1);
      var search = window.location.search.substring(1);

      debug.innerText = 'hash: ' + hash.substring(0, 100) + ' | search: ' + search.substring(0, 100);

      // Parse both hash and search params
      var params = {};
      var parseStr = hash || search;
      parseStr.split('&').forEach(function(part) {
        var item = part.split('=');
        if (item.length >= 2) params[item[0]] = decodeURIComponent(item.slice(1).join('='));
      });

      if (params.id_token) {
        status.innerText = 'Got id_token! Sending...';
        if (window.opener) {
          window.opener.postMessage({ type: 'GOOGLE_AUTH_TOKEN', token: params.id_token }, '*');
          status.innerText = 'Done! Closing...';
        } else {
          status.innerText = 'No opener found!';
        }
      } else if (params.access_token) {
        status.innerText = 'Got access_token! Sending...';
        if (window.opener) {
          window.opener.postMessage({ type: 'GOOGLE_AUTH_TOKEN', token: params.access_token }, '*');
        }
      } else if (params.error) {
        status.innerText = 'Error: ' + params.error;
        if (window.opener) {
          window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: params.error }, '*');
        }
      } else {
        status.innerText = 'No token in URL';
        debug.innerText += ' | FULL: ' + fullUrl.substring(0, 200);
        if (window.opener) {
          window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: 'No token in callback URL' }, '*');
        }
      }
    } catch(e) {
      status.innerText = 'Exception: ' + e.toString();
      if (window.opener) {
        window.opener.postMessage({ type: 'GOOGLE_AUTH_ERROR', error: e.toString() }, '*');
      }
    }

    setTimeout(function() { window.close(); }, 3000);
  </script>
</body>
</html>
